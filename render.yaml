services:
  - type: web
    name: reelmind
    env: node
    region: oregon
    plan: starter
    buildCommand: "npm install && npm run build && cd server && npm install"
    startCommand: "node server/index.js"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    # OPTIONAL: Add a disk for persistence across deploys
    # If you add one, set mount path to: /opt/render/project/src/server/data
    # disk:
    #   name: reelmind-data
    #   mountPath: /opt/render/project/src/server/data
    #   sizeGB: 10
