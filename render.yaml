services:
  - type: web
    name: reelmind
    env: node
    region: oregon
    plan: starter
    buildCommand: "npm install && npm run build && cd server && npm install"
    startCommand: "npm start"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: reelmind-data
      mountPath: /data
      sizeGB: 10
